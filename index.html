<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Incident Portal | DKB Anchor Security</title>
    
    <style>
        :root {
            --primary-blue: #002347;
            --accent-gold: #c5a059;
            --success-green: #28a745;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--primary-blue); 
            margin: 0; padding: 15px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; user-select: none;
        }

        /* --- LANDING PAGE --- */
        .landing-container { text-align: center; width: 100%; max-width: 400px; }
        .company-logo { max-width: 150px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .landing-container h1 { color: var(--white); font-size: 1.5rem; margin: 0; text-transform: uppercase; }
        .slogan { color: var(--accent-gold); font-size: 0.85rem; font-weight: bold; margin-top: 8px; }
        
        .btn-main {
            background-color: var(--accent-gold); color: var(--primary-blue); border: none; padding: 18px; width: 100%; border-radius: 8px;
            font-size: 1.2rem; font-weight: 800; box-shadow: 0 6px 15px rgba(0,0,0,0.4); margin-top: 40px; cursor: pointer;
        }

        /* --- MODAL --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 35, 71, 0.9); backdrop-filter: blur(5px);
            z-index: 1000; justify-content: center; align-items: center; padding: 15px; box-sizing: border-box;
        }
        .modal-overlay.active { display: flex; }

        .attendance-card {
            background: var(--white); padding: 25px 20px; border-radius: 12px; width: 100%; max-width: 420px; 
            border-top: 8px solid var(--accent-gold); position: relative; max-height: 90vh; overflow-y: auto;
        }

        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 1.8rem; color: #999; cursor: pointer; }
        .modal-header { text-align: center; margin-bottom: 20px; color: var(--primary-blue); }

        /* --- FORM ELEMENTS --- */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 0.85rem; color: var(--primary-blue); }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1.5px solid #dce0e4; border-radius: 8px; 
            box-sizing: border-box; font-size: 1rem; font-family: inherit;
        }
        textarea { height: 80px; resize: none; }

        /* --- CAMERA --- */
        .camera-box {
            background: #f9f9f9; border: 2px dashed var(--accent-gold); border-radius: 10px; 
            padding: 15px; text-align: center; cursor: pointer;
        }
        #videoFeed, #photoResult { width: 100%; border-radius: 8px; display: none; margin-top: 10px; }
        .btn-capture { background: var(--accent-gold); color: var(--primary-blue); border: none; padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; margin-top: 10px; display: none; }
        .retake-text { font-size: 0.8rem; color: #dc3545; text-decoration: underline; margin-top: 10px; display: none; cursor: pointer; }

        .btn-submit { background-color: var(--primary-blue); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-size: 1.1rem; font-weight: bold; margin-top: 10px; cursor: pointer; }
        #statusMsg { display: none; text-align: center; padding: 15px; background: #d4edda; color: #155724; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="landing-container">
    <img src="DKB Anchor Logo.png" alt="DKB Logo" class="company-logo">
    <h1>DKB Anchor Security</h1>
    <div class="slogan">Integrity, Excellence and Reliability</div>
    <button id="openModalBtn" class="btn-main">File Incident Report</button>
</div>

<div class="modal-overlay" id="formModal">
    <div class="attendance-card">
        <span class="close-btn" id="closeModalBtn">&times;</span>
        <div class="modal-header"><h2>Incident Report</h2></div>
        <div id="statusMsg">Report Submitted Successfully!</div>

        <form id="incidentForm">
            <div class="form-group">
                <label>Reporting Officer</label>
                <input type="text" id="guardName" placeholder="Full Name" required>
            </div>
            
            <div class="form-group">
                <label>Incident Location</label>
                <input type="text" id="postLocation" placeholder="e.g. Main Lobby" required>
            </div>

            <div class="form-group">
                <label>Nature of Incident</label>
                <select id="incidentType" required>
                    <option value="">-- Select Type --</option>
                    <option value="Theft">Theft/Burglary</option>
                    <option value="Vandalism">Vandalism</option>
                    <option value="Medical">Medical Emergency</option>
                    <option value="Trespassing">Unauthorized Access</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Detailed Description</label>
                <textarea id="description" placeholder="Describe what happened..." required></textarea>
            </div>

            <div class="form-group">
                <label>Visual Evidence (Live Photo)</label>
                <div class="camera-box" id="cameraBox">
                    <span id="cameraPrompt">📸 Tap to Open Camera</span>
                    <video id="videoFeed" autoplay playsinline></video>
                    <button type="button" id="captureBtn" class="btn-capture">Capture Photo</button>
                    <canvas id="photoCanvas" style="display:none;"></canvas>
                    <img id="photoResult">
                    <div id="retakeBtn" class="retake-text">Retake Photo</div>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Submit Official Report</button>
        </form>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzSPiD0ctJAZmsix-OK8xfTybomJIzDiKpm8v6k2Y1ghARTLoxQ1uYbSgsVKUVS6m5X/exec';
    const modal = document.getElementById('formModal');
    const cameraBox = document.getElementById('cameraBox');
    const videoFeed = document.getElementById('videoFeed');
    const captureBtn = document.getElementById('captureBtn');
    const photoResult = document.getElementById('photoResult');
    const submitBtn = document.getElementById('submitBtn');
    const form = document.getElementById('incidentForm');

    let mediaStream = null;
    let finalBase64Photo = null;

    document.getElementById('openModalBtn').onclick = () => modal.classList.add('active');
    document.getElementById('closeModalBtn').onclick = () => { modal.classList.remove('active'); stopCamera(); };

    cameraBox.onclick = async (e) => {
        if (e.target.id === 'captureBtn' || e.target.id === 'retakeBtn' || finalBase64Photo) return;
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            videoFeed.srcObject = mediaStream;
            videoFeed.style.display = 'block';
            captureBtn.style.display = 'block';
            document.getElementById('cameraPrompt').style.display = 'none';
        } catch (err) { alert("Camera access required."); }
    };

    captureBtn.onclick = () => {
        const canvas = document.getElementById('photoCanvas');
        canvas.width = videoFeed.videoWidth;
        canvas.height = videoFeed.videoHeight;
        canvas.getContext('2d').drawImage(videoFeed, 0, 0);
        const data = canvas.toDataURL('image/jpeg', 0.6);
        finalBase64Photo = data.split(',')[1];
        photoResult.src = data;
        photoResult.style.display = 'block';
        videoFeed.style.display = 'none';
        captureBtn.style.display = 'none';
        document.getElementById('retakeBtn').style.display = 'block';
        stopCamera();
    };

    document.getElementById('retakeBtn').onclick = (e) => {
        e.stopPropagation();
        finalBase64Photo = null;
        photoResult.style.display = 'none';
        document.getElementById('retakeBtn').style.display = 'none';
        document.getElementById('cameraPrompt').style.display = 'block';
    };

    function stopCamera() { if(mediaStream) mediaStream.getTracks().forEach(t => t.stop()); }

    form.onsubmit = (e) => {
        e.preventDefault();
        if (!finalBase64Photo) return alert("Photo evidence is required.");
        
        submitBtn.disabled = true;
        submitBtn.innerText = "Verifying Location...";

        navigator.geolocation.getCurrentPosition(
            (pos) => upload(pos.coords.latitude, pos.coords.longitude),
            () => { alert("GPS required."); submitBtn.disabled = false; }
        );
    };

    function upload(lat, lon) {
        submitBtn.innerText = "Sending Report...";
        const payload = {
            name: document.getElementById('guardName').value,
            location: document.getElementById('postLocation').value,
            type: document.getElementById('incidentType').value,
            desc: document.getElementById('description').value,
            image: finalBase64Photo,
            lat: lat, lon: lon
        };

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => {
            document.getElementById('statusMsg').style.display = 'block';
            form.style.display = 'none';
            setTimeout(() => location.reload(), 3000);
        });
    }
</script>
</body>
</html>
